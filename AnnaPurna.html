<header>
    <div class="logo-container">
        <div class="buffalo-logo">🐃</div>

        <h1 class="logo-text">
            <span class="blue">A</span>nna<span class="green">P</span>urna
            Buffalo Platform
        </h1>

        <p class="tagline">
            Andhra Pradesh's Trusted Buffalo Marketplace
        </p>
    </div>
</header>

<!-- Approval Stamp Popup -->
<div id="approvalStamp" class="stamp-popup">
    <div class="stamp-box">
        <h2>✅ Approved by Annapurna</h2>
        <p>
            Inspired by generations of buffalo and cattle farming experience.
        </p>
        <button onclick="closeStamp()">Enter Platform</button>
    </div>
</div>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

header{
    background:linear-gradient(135deg,#0d47a1,#2e7d32);
    color:white;
    text-align:center;
    padding:30px;
}

.buffalo-logo{
    font-size:80px;
}

.logo-text{
    font-size:48px;
    margin:10px 0;
}

.blue{
    color:#42a5f5;
    font-weight:bold;
}

.green{
    color:#81c784;
    font-weight:bold;
}

.tagline{
    font-size:20px;
}

/* Approval Popup */

.stamp-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.stamp-box{
    background:white;
    padding:30px;
    text-align:center;
    border-radius:15px;
    max-width:500px;
    border:5px solid #2e7d32;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.stamp-box h2{
    color:#2e7d32;
}

.stamp-box button{
    background:#0d47a1;
    color:white;
    border:none;
    padding:12px 25px;
    margin-top:15px;
    border-radius:5px;
    cursor:pointer;
}

</style>

<script>
function closeStamp(){
    document.getElementById("approvalStamp").style.display="none";
}
</script>
